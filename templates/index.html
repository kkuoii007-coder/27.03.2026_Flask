<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Случайные цитаты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100 d-flex flex-column justify-content-center align-items-center p-4">
    <div class="container text-center">
        <h1 class="mb-4">Случайная философская цитата</h1>

        <form method="POST" class="mb-4">
            <button type="submit" class="btn btn-primary btn-lg">Получить цитату</button>
        </form>

        {% if quote %}
            <div class="card shadow mx-auto" style="max-width: 500px;">
                <div class="card-body p-5">
                    <blockquote class="blockquote">
                        <p>"{{ quote.quote }}"</p>  <!-- Русский -->
                        <small class="text-muted">Оригинал: "{{ quote.original_quote }}" by {{ quote.original_author }}</small>
                        <footer class="blockquote-footer">{{ quote.author }}</footer>  <!-- Русский автор -->
                    </blockquote>
                </div>
            </div>
        {% else %}
            <p class="lead">Нажмите кнопку для цитаты</p>
        {% endif %}
    </div>
</body>
</html>
